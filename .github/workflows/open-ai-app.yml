name: Build & deploy Next.js app to Azure Web App

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: [main]

  # Allow manual workflow trigger
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🌱 Checkout to the branch
        uses: actions/checkout@v6

      - name: 🍏 Set up Node.js version
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"

      - name: ⚙️ npm install and build
        run: |
          cd ./src
          npm install
          npm run build --if-present
          cd ..

      - name: 📂 Copy standalone into the root
        run: cp -R ./src/.next/standalone ./site-deploy

      - name: 📂 Copy static into the .next folder
        run: cp -R ./src/.next/static ./site-deploy/.next/static

      - name: 📂 Copy Public folder
        run: cp -R ./src/public ./site-deploy/public

      - name: 📦 Package Next application
        run: |
          cd ./site-deploy
          zip Nextjs-site.zip ./* .next -qr      
          
      - name: 🔍 Diagnostics
        run: |
          ls ./src
          ls ./src/.next
          ls ./site-deploy

      - name: ⬆️ Publish Next Application artifact
        uses: actions/upload-artifact@v7
        with:
          name: Nextjs-site
          path: ./site-deploy/Nextjs-site.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: "Production"

    steps:
      - name: ⬇️ Download artifact from build job
        uses: actions/download-artifact@v8
        with:
          name: Nextjs-site

      - name: 🗝️ Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Set the build during deployment setting to false. This setting was added in the templates to all azd to work, but breaks deployment via webapps-deploy 
      - name: Azure CLI script
        uses: azure/CLI@v3
        env:
          AZURE_APP_SERVICE_NAME: ${{ secrets.AZURE_APP_SERVICE_NAME }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
        with:
          inlineScript: |
            set -euo pipefail

            if [ -z "$AZURE_APP_SERVICE_NAME" ]; then
              echo "::error::AZURE_APP_SERVICE_NAME secret is not set."
              exit 1
            fi

            rg="$AZURE_RESOURCE_GROUP"
            if [ -z "$rg" ]; then
              rg=$(az webapp list --query "[?name=='$AZURE_APP_SERVICE_NAME'].resourceGroup | [0]" --output tsv)
            fi

            if [ -z "$rg" ]; then
              echo "::error::Could not find a resource group for App Service '$AZURE_APP_SERVICE_NAME'. Set the AZURE_RESOURCE_GROUP secret, or verify AZURE_APP_SERVICE_NAME and the service principal's RBAC permissions."
              exit 1
            fi

            echo Setting SCM_DO_BUILD_DURING_DEPLOYMENT=false on app service "$AZURE_APP_SERVICE_NAME"
            az webapp config appsettings set -n "$AZURE_APP_SERVICE_NAME" -g "$rg" --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false -o none
            echo Setting --startup-file=\"node server.js\" on app service "$AZURE_APP_SERVICE_NAME"
            az webapp config set --startup-file="node server.js" -n "$AZURE_APP_SERVICE_NAME" -g "$rg" -o none
            sleep 10

      - name: 🚀 Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_SERVICE_NAME }}
          package: ${{ github.workspace }}/Nextjs-site.zip

      - name: 🧹 Cleanup
        run: rm ${{ github.workspace }}/Nextjs-site.zip
